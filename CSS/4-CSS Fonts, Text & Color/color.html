<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <style>
        #a {
            color: red;
        }

        #b {
            color: #c8e60b;
        }

        #c {
            color: rgb(22, 0, 221);
        }

        #d {
            color: rgb(246, 4, 214);
        }

        #e {
            color: hsl(205, 100%, 50%);
        }
    </style>
</head>

<body>
    <h1>Lets learn about color</h1>
    <p>
        Color can be represented in:
    <ol>
        <li id="a">Color Keywords</li>
        <li id="b">Hex Color Code</li>
        <li id="c">RGB</li>
        <li id="d">RGBA</li>
        <li id="e">HSL</li>
    </ol>
    </p>
</body>

</html>
