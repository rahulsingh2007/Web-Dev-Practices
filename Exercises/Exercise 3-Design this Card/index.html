<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design a card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="image">
            <img width="188" src="card.jpg" alt="Fishing image">
        </div>
        <div class="capsules">
            <span>Nature</span>
            <span>Lake</span>
        </div>
        <div class="content">
            <h2>Rahul</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Recusandae deleniti sit ipsum
                reiciendis deserunt quibusdam consequatur culpa repudiandae sapiente! Ullam vel saepe quas perferendis
                ipsum.
            </p>
        </div>
        <div class="button">
            <button>Read More</button>
        </div>
    </div>
</body>

</html>
